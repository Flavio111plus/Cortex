name: Build Release

on:
  workflow_dispatch:
  push:
    branches: [main, master]

env:
  MIX_ENV: prod
  ELIXIR_VERSION: "1.14.5"
  OTP_VERSION: "27.1"

jobs:
  # ============================================================
  # Job 1: Server binary (Burrito only, no Tauri) — Linux x86_64
  # ============================================================
  build-server:
    name: Server Binary (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup BEAM
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Hex/Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Fetch Deps
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Build Assets
        run: |
          mix assets.setup
          mix assets.deploy

      - name: Build Server Binary (Burrito)
        run: mix release cortex --overwrite

      - name: Upload Server Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cortex-server-linux-x86_64
          path: burrito_out/cortex_linux

  # ============================================================
  # Job 2: Desktop app (Tauri + Burrito sidecar) — per platform
  # ============================================================
  build-desktop:
    name: Desktop (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x86_64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            burrito-target: windows
            sidecar-triple: x86_64-pc-windows-msvc
            sidecar-ext: .exe
            burrito-bin: cortex_windows.exe

          - label: macOS aarch64
            os: macos-latest
            rust-target: aarch64-apple-darwin
            burrito-target: macos_m1
            sidecar-triple: aarch64-apple-darwin
            sidecar-ext: ""
            burrito-bin: cortex_macos_m1

          - label: Linux x86_64
            os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            burrito-target: linux
            sidecar-triple: x86_64-unknown-linux-gnu
            sidecar-ext: ""
            burrito-bin: cortex_linux

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup BEAM
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      # Linux: install system deps for Tauri
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Hex/Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Fetch Deps
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Build Assets
        run: |
          mix assets.setup
          mix assets.deploy

      - name: Build Backend Sidecar (Burrito)
        run: mix release cortex --overwrite

      - name: Place sidecar binary for Tauri
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          cp "burrito_out/${{ matrix.burrito-bin }}" \
             "src-tauri/binaries/cortex_backend-${{ matrix.sidecar-triple }}${{ matrix.sidecar-ext }}"
          ls -la src-tauri/binaries/

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri Desktop App
        working-directory: src-tauri
        run: cargo tauri build --target ${{ matrix.rust-target }}

      - name: Upload Desktop Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cortex-desktop-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**
